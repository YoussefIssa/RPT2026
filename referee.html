<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Referee Panel — RPT 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
@import url("https://db.onlinewebfonts.com/c/d64d62baa65f9a54725f8ca3183dec5b?family=Neurial+Grotesk+Extrabold");
@import url("https://db.onlinewebfonts.com/c/6accc03c892f9700ce710b0e4eb6a1d1?family=Neurial+Grotesk+Medium");

:root {
  --ph:#b36cff; --ep:#844bff; --ul:#5e6bff; --rb:#43c0ff;
  --dark:#07050E; --d2:#0E0B1D;
  --text:#F0EEFF; --muted:#8B82BB;
  --green:#2ECC71; --red:#E74C3C; --gold:#D4A843;
  --ng-eb:'Neurial Grotesk Extrabold','DM Sans',sans-serif;
  --ng-md:'Neurial Grotesk Medium','DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 65% 50% at 50% -5%,rgba(132,75,255,.28) 0%,transparent 65%),
    radial-gradient(ellipse 40% 35% at 93% 18%,rgba(67,192,255,.15) 0%,transparent 60%),
    linear-gradient(160deg,#07050E 0%,#0C091B 55%,#07050E 100%);
}

/* ── SCREENS ── */
.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:24px 20px 60px;}
.screen.active{display:block;}
#screen-login{display:none;align-items:center;justify-content:center;}
#screen-login.active{display:flex;}

/* ── LOGIN ── */
.login-box{
  background:rgba(14,11,29,.95);border:1px solid rgba(132,75,255,.3);
  border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center;
  box-shadow:0 0 80px rgba(132,75,255,.15);
}
.login-icon{font-size:44px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(132,75,255,.6));}
.login-title{font-family:var(--ng-eb);font-size:22px;margin-bottom:6px;
  background:linear-gradient(110deg,#b36cff,#43c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.login-input{
  width:100%;padding:13px 16px;border-radius:8px;border:1px solid rgba(132,75,255,.3);
  background:rgba(132,75,255,.07);color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s;margin-bottom:14px;letter-spacing:3px;text-align:center;
}
.login-input:focus{border-color:rgba(132,75,255,.65);}
.btn-primary{
  width:100%;padding:13px;border-radius:8px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#844bff,#5e6bff);color:#fff;
  font-size:14px;font-weight:700;font-family:var(--ng-md);transition:opacity .2s,transform .2s;
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.login-error{color:var(--red);font-size:12px;margin-top:10px;display:none;}

/* ── PICKER ── */
#screen-picker{max-width:700px;margin:0 auto;}
.picker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.page-title{font-family:var(--ng-eb);font-size:20px;
  background:linear-gradient(110deg,#b36cff,#43c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.btn-ghost-sm{
  padding:7px 16px;border-radius:20px;border:1px solid rgba(132,75,255,.3);
  background:transparent;color:var(--muted);font-size:12px;cursor:pointer;
  transition:all .2s;font-family:'DM Sans',sans-serif;
}
.btn-ghost-sm:hover{border-color:rgba(132,75,255,.6);color:var(--text);}
.day-label{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.day-label::after{content:'';flex:1;height:1px;background:rgba(132,75,255,.2);}
.match-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px;}
.match-pick-btn{
  width:100%;background:rgba(14,11,29,.88);border:1px solid rgba(132,75,255,.2);
  border-radius:10px;padding:16px 20px;cursor:pointer;text-align:left;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;
  transition:border-color .2s,background .2s,transform .15s;font-family:'DM Sans',sans-serif;
}
.match-pick-btn:hover{border-color:rgba(132,75,255,.5);background:rgba(132,75,255,.07);transform:translateX(3px);}
.match-pick-btn.done{border-color:rgba(46,204,113,.3);}
.match-pick-btn.live{border-color:rgba(67,192,255,.5);box-shadow:0 0 16px rgba(67,192,255,.1);}
.pick-time{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);white-space:nowrap;}
.pick-teams{font-size:14px;font-weight:500;color:var(--text);}
.pick-teams em{color:var(--muted);font-style:normal;font-size:12px;margin:0 5px;}
.pick-grp{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:3px;display:inline-block;margin-top:4px;}
.pick-status{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:10px;white-space:nowrap;}
.s-pending{color:var(--muted);background:rgba(139,130,187,.1);border:1px solid rgba(139,130,187,.2);}
.s-live{color:#43c0ff;background:rgba(67,192,255,.1);border:1px solid rgba(67,192,255,.3);animation:pulseLive 1.5s infinite;}
.s-done{color:#2ECC71;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);}
.grp-a{color:#b36cff;background:rgba(132,75,255,.14);border:1px solid rgba(132,75,255,.3);}
.grp-b{color:#7b8aff;background:rgba(94,107,255,.14);border:1px solid rgba(94,107,255,.3);}
.grp-c{color:#43c0ff;background:rgba(67,192,255,.14);border:1px solid rgba(67,192,255,.3);}
.grp-ko{color:var(--gold);background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);}
@keyframes pulseLive{0%,100%{opacity:1}50%{opacity:.6}}

/* ── KO TEAM NAME INPUTS ── */
.ko-inputs{display:none;padding:12px 20px;background:rgba(132,75,255,.05);border-bottom:1px solid rgba(132,75,255,.1);}
.ko-inputs.show{display:block;}
.ko-inputs-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.ko-inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.ko-input{
  padding:10px 12px;border-radius:6px;border:1px solid rgba(132,75,255,.25);
  background:rgba(132,75,255,.07);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s;
}
.ko-input:focus{border-color:rgba(132,75,255,.6);}
.ko-start-btn{
  width:100%;padding:11px;border-radius:8px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#844bff,#5e6bff);color:#fff;
  font-size:13px;font-weight:700;font-family:var(--ng-md);transition:all .2s;
}
.ko-start-btn:hover{opacity:.9;}

/* ── SCORING ── */
#screen-scoring{max-width:560px;margin:0 auto;padding:16px 16px 60px;}
.scoring-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.btn-back{
  padding:8px 16px;border-radius:8px;border:1px solid rgba(132,75,255,.3);
  background:transparent;color:var(--muted);font-size:13px;cursor:pointer;
  transition:all .2s;font-family:'DM Sans',sans-serif;
}
.btn-back:hover{border-color:rgba(132,75,255,.6);color:var(--text);}
.match-info-bar{flex:1;min-width:0;}
.match-info-time{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* SCOREBOARD */
.scoreboard{
  background:rgba(14,11,29,.95);border:1px solid rgba(132,75,255,.25);
  border-radius:16px;overflow:hidden;margin-bottom:18px;
}
.sb-header{
  padding:12px 20px;background:rgba(132,75,255,.08);
  border-bottom:1px solid rgba(132,75,255,.15);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.sb-format{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.sb-set-badges{display:flex;gap:6px;flex-wrap:wrap;}
.set-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;
  background:rgba(132,75,255,.1);color:var(--muted);border:1px solid rgba(132,75,255,.2);}
.set-badge.won1{background:rgba(132,75,255,.2);color:var(--ph);border-color:rgba(132,75,255,.4);}
.set-badge.won2{background:rgba(67,192,255,.15);color:#43c0ff;border-color:rgba(67,192,255,.35);}

.sb-body{padding:16px 20px 8px;}
.sb-row{
  display:grid;grid-template-columns:1fr auto;
  align-items:center;gap:12px;padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.sb-row:last-child{border-bottom:none;}
.sb-team{font-size:16px;font-weight:600;transition:color .2s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-team.serving::after{content:' 🎾';font-size:12px;}
.sb-team.winner-team{color:var(--ph);}
.sb-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sb-games{font-size:15px;font-weight:700;color:var(--muted);min-width:28px;text-align:center;}
.sb-games.leading{color:var(--text);}
.sb-sep{font-size:11px;color:rgba(139,130,187,.3);}
.sb-pts{
  font-family:var(--ng-eb);font-size:46px;font-weight:800;
  min-width:72px;text-align:center;
  background:linear-gradient(135deg,#b36cff,#5e6bff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  transition:all .15s;
}
.sb-pts.leading{background:linear-gradient(135deg,#fff,#b36cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.game-status{
  text-align:center;padding:8px 16px 14px;
  font-size:12px;font-weight:500;color:var(--muted);line-height:1.6;
}
.game-status .hl{color:var(--ph);font-weight:700;}
.tiebreak-badge{
  display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  background:rgba(212,168,67,.1);color:var(--gold);border:1px solid rgba(212,168,67,.3);
  margin-right:6px;
}

/* POINT BUTTONS */
.point-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.btn-point{
  padding:26px 14px;border-radius:14px;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:all .12s;user-select:none;font-family:'DM Sans',sans-serif;
}
.btn-point:active{transform:scale(.94);}
.btn-point .btn-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.55;}
.btn-point .btn-name{font-size:13px;font-weight:600;text-align:center;line-height:1.3;color:var(--text);}
.btn-p1{background:linear-gradient(135deg,rgba(132,75,255,.22),rgba(132,75,255,.08));border:1px solid rgba(132,75,255,.38);}
.btn-p1:hover{background:linear-gradient(135deg,rgba(132,75,255,.36),rgba(132,75,255,.15));}
.btn-p2{background:linear-gradient(135deg,rgba(67,192,255,.18),rgba(67,192,255,.06));border:1px solid rgba(67,192,255,.32);}
.btn-p2:hover{background:linear-gradient(135deg,rgba(67,192,255,.3),rgba(67,192,255,.12));}

/* ACTIONS */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-undo{
  padding:13px;border-radius:10px;border:1px solid rgba(139,130,187,.25);
  background:rgba(139,130,187,.07);color:var(--muted);font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--ng-md);transition:all .2s;
}
.btn-undo:hover:not(:disabled){border-color:rgba(139,130,187,.5);color:var(--text);}
.btn-undo:disabled{opacity:.3;cursor:not-allowed;}
.btn-end{
  padding:13px;border-radius:10px;border:1px solid rgba(231,76,60,.3);
  background:rgba(231,76,60,.08);color:var(--red);font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--ng-md);transition:all .2s;
}
.btn-end:hover{background:rgba(231,76,60,.16);}

/* MATCH OVER */
.match-over{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(7,5,14,.92);backdrop-filter:blur(16px);
  align-items:center;justify-content:center;
}
.match-over.show{display:flex;}
.over-box{
  background:rgba(14,11,29,.98);border:1px solid rgba(132,75,255,.4);
  border-radius:20px;padding:44px 32px;text-align:center;max-width:360px;width:90%;
  box-shadow:0 0 80px rgba(132,75,255,.2);
}
.over-trophy{font-size:52px;margin-bottom:14px;filter:drop-shadow(0 0 24px rgba(212,168,67,.6));animation:floatUp 2s ease-in-out infinite;}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.over-title{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.over-winner{font-family:var(--ng-eb);font-size:24px;margin-bottom:6px;
  background:linear-gradient(110deg,#b36cff,#43c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.over-score{font-size:14px;color:var(--muted);margin-bottom:28px;}
.btn-confirm{
  width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#844bff,#5e6bff);color:#fff;
  font-size:14px;font-weight:700;font-family:var(--ng-md);
  transition:all .2s;margin-bottom:10px;
}
.btn-confirm:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(132,75,255,.4);}
.btn-cancel-over{
  width:100%;padding:11px;border-radius:10px;border:1px solid rgba(139,130,187,.3);
  background:transparent;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;
}
.btn-cancel-over:hover{color:var(--text);}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  z-index:999;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:600;
  background:rgba(14,11,29,.95);border:1px solid rgba(132,75,255,.4);
  box-shadow:0 8px 32px rgba(0,0,0,.4);white-space:nowrap;opacity:0;transition:all .3s;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:rgba(46,204,113,.4);color:#2ECC71;}
.toast.error{border-color:rgba(231,76,60,.4);color:var(--red);}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="screen active" id="screen-login">
  <div class="login-box">
    <div class="login-icon">🏓</div>
    <div class="login-title">Referee Panel</div>
    <div class="login-sub">Ramadan Padel Tournament 2026</div>
    <input type="password" id="pwd-input" class="login-input" placeholder="Password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-primary" onclick="doLogin()">Enter</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ══ PICKER ══ -->
<div class="screen" id="screen-picker">
  <div class="picker-header">
    <div>
      <div class="page-title">🎾 Select Your Match</div>
      <div class="page-sub">Tap the match you are refereeing to start scoring</div>
    </div>
    <button class="btn-ghost-sm" onclick="doLogout()">Log out</button>
  </div>

  <div class="day-label">🗓️ Sunday, March 8 — Group Stage</div>
  <div class="match-list" id="list-sunday"></div>

  <div class="day-label">⚡ Monday, March 9 — Knockouts</div>
  <div class="match-list" id="list-monday"></div>
</div>

<!-- ══ SCORING ══ -->
<div class="screen" id="screen-scoring">
  <div class="scoring-nav">
    <button class="btn-back" onclick="goBack()">← Back</button>
    <div class="match-info-bar">
      <div class="match-info-time" id="info-line"></div>
    </div>
  </div>

  <div class="scoreboard">
    <div class="sb-header">
      <span class="sb-format" id="sb-format">SHORT SET · GROUP STAGE</span>
      <div class="sb-set-badges" id="sb-sets"></div>
    </div>
    <div class="sb-body">
      <div class="sb-row">
        <div class="sb-team" id="sb-t1">Team 1</div>
        <div class="sb-right">
          <div class="sb-games" id="sb-g1">0</div>
          <div class="sb-sep">|</div>
          <div class="sb-pts"  id="sb-p1">0</div>
        </div>
      </div>
      <div class="sb-row">
        <div class="sb-team" id="sb-t2">Team 2</div>
        <div class="sb-right">
          <div class="sb-games" id="sb-g2">0</div>
          <div class="sb-sep">|</div>
          <div class="sb-pts"  id="sb-p2">0</div>
        </div>
      </div>
    </div>
    <div class="game-status" id="game-status"></div>
  </div>

  <div class="point-btns">
    <button class="btn-point btn-p1" onclick="addPoint(0)">
      <span class="btn-label">Point for</span>
      <span class="btn-name" id="btn-n1">Team 1</span>
    </button>
    <button class="btn-point btn-p2" onclick="addPoint(1)">
      <span class="btn-label">Point for</span>
      <span class="btn-name" id="btn-n2">Team 2</span>
    </button>
  </div>

  <div class="action-row">
    <button class="btn-undo" id="btn-undo" onclick="undoPoint()" disabled>↩ Undo Last Point</button>
    <button class="btn-end" onclick="manualEnd()">⏹ End Match</button>
  </div>
</div>

<!-- ══ MATCH OVER ══ -->
<div class="match-over" id="match-over">
  <div class="over-box">
    <div class="over-trophy">🏆</div>
    <div class="over-title">Match Winner</div>
    <div class="over-winner" id="over-winner"></div>
    <div class="over-score"  id="over-score"></div>
    <button class="btn-confirm" onclick="saveAndFinish()">✓ Confirm &amp; Save to Results</button>
    <button class="btn-cancel-over" onclick="document.getElementById('match-over').classList.remove('show')">Keep Scoring</button>
  </div>
</div>

<div class="toast" id="toast"></div>

  {id:'B5',group:'B',court:2,time:'21:30',team1:'Finaira Blaugrana',             team2:'خليها على الله'},
  {id:'C5',group:'C',court:1,time:'21:45',team1:'بادل فاقد',                     team2:'F&K'},
  {id:'A6',group:'A',court:2,time:'21:45',team1:'اوس ملح و داب',                 team2:'3antar w Chaddad'},
  {id:'B6',group:'B',court:1,time:'22:00',team1:'Hertz',                         team2:'خليها على الله'},
  {id:'C6',group:'C',court:2,time:'22:00',team1:'الشناوي للبدل و التنس الطاولة', team2:'F&K'},
];
const MONDAY = [
  {id:'QF1',group:'KO',court:1,time:'20:00',team1:'1A',   team2:'Best 3rd ★'},
  {id:'QF2',group:'KO',court:2,time:'20:00',team1:'1B',   team2:'2C'},
  {id:'QF3',group:'KO',court:1,time:'20:25',team1:'1C',   team2:'2A'},
  {id:'QF4',group:'KO',court:2,time:'20:25',team1:'2B',   team2:'Best 3rd ★'},
  {id:'SF1',group:'KO',court:1,time:'20:55',team1:'W QF1',team2:'W QF2'},
  {id:'SF2',group:'KO',court:2,time:'20:55',team1:'W QF3',team2:'W QF4'},
  {id:'FIN',group:'KO',court:1,time:'21:30',team1:'W SF1',team2:'W SF2'},
];
const ALL = [...SUNDAY,...MONDAY];
const GRP_CLS = {A:'grp-a',B:'grp-b',C:'grp-c',KO:'grp-ko'};
const GRP_LBL = {A:'Group A',B:'Group B',C:'Group C',KO:'Knockout'};

/* ── SCORING ENGINE ── */
const PT = ['0','15','30','40'];
let S = null, H = [], activeM = null, fbRef = null;

function fresh(m, t1override, t2override) {
  return {
    matchId:m.id, isKO:m.group==='KO',
    team1: t1override||m.team1,
    team2: t2override||m.team2,
    sets:[0,0], games:[0,0], points:[0,0],
    inTB:false, serving:0,
    over:false, winner:null, setScores:[]
  };
}

const ptLabel = (p,tb) => tb ? String(p) : PT[Math.min(p,3)];
const isDeuce = s => !s.inTB && s.points[0]>=3 && s.points[1]>=3;
const gameTarget = s => s.isKO ? 6 : 4;

function setWon(s,i) {
  const o=1-i;
  if(s.inTB) return s.games[i]>=7 && s.games[i]-s.games[o]>=2;
  if(s.isKO){
    if(s.games[i]>=6 && s.games[i]-s.games[o]>=2) return true;
    if(s.games[i]===7 && s.games[o]===5) return true;
    return false;
  }
  return s.games[i]>=4;
}

function needsTB(s) {
  return s.isKO ? s.games[0]===6&&s.games[1]===6
                : s.games[0]===3&&s.games[1]===3;
}

function endGame(i) {
  S.games[i]++;
  S.points=[0,0];
  S.serving=1-S.serving;
  if(needsTB(S)){ S.inTB=true; S.games=[0,0]; }
  else if(setWon(S,i)) endSet(i);
}

function endSet(i) {
  S.setScores.push({g1:S.games[0],g2:S.games[1]});
  S.sets[i]++;
  S.games=[0,0]; S.points=[0,0]; S.inTB=false;
  if(S.sets[i]>=1){ S.over=true; S.winner=i; triggerMatchOver(); }
}

window.addPoint = function(i) {
  if(!S||S.over) return;
  H.push(JSON.parse(JSON.stringify(S)));
  document.getElementById('btn-undo').disabled=false;
  const o=1-i;
  if(S.inTB){
    S.games[i]++;
    if(setWon(S,i)) endSet(i);
  } else {
    S.points[i]++;
    if(isDeuce(S)){
      if(S.points[i]-S.points[o]>=2) endGame(i);
    } else if(S.points[i]>=4&&S.points[o]<3) endGame(i);
    else if(S.points[i]===4&&S.points[o]===3) { /* needs deuce */ }
  }
  updateDisplay(); pushLive();
};

window.undoPoint = function() {
  if(!H.length) return;
  S=H.pop();
  document.getElementById('btn-undo').disabled=!H.length;
  updateDisplay(); pushLive();
};

window.manualEnd = function() {
  if(!S) return;
  const i = S.games[0]>=S.games[1] ? 0 : 1;
  S.winner=i; triggerMatchOver();
};

function triggerMatchOver() {
  const wname = S.winner===0 ? S.team1 : S.team2;
  document.getElementById('over-winner').textContent = wname;
  const sc = S.setScores.map(s=>`${s.g1}–${s.g2}`).join('  ');
  document.getElementById('over-score').textContent = sc || `${S.games[0]}–${S.games[1]} games`;
  document.getElementById('match-over').classList.add('show');
}

window.saveAndFinish = async function() {
  if(!S||S.winner===null) return;
  let gw1=0,gw2=0;
  S.setScores.forEach(s=>{ if(s.g1>s.g2) gw1++; else gw2++; });
  // Ensure winner has at least 1 game win recorded
  if(S.winner===0) gw1=Math.max(gw1,1);
  else gw2=Math.max(gw2,1);
  await set(fbRef,{
    status:'done', team1:S.team1, team2:S.team2,
    games_t1:gw1, games_t2:gw2,
    setScores:S.setScores, completedAt:Date.now()
  });
  document.getElementById('match-over').classList.remove('show');
  toast('✓ Saved! Results updated live.','success');
  setTimeout(()=>goBack(),1400);
};

function pushLive() {
  if(!fbRef||!S) return;
  update(fbRef,{
    status: S.over?'done':'live',
    team1:S.team1, team2:S.team2,
    live_p1:S.points[0], live_p2:S.points[1],
    live_g1:S.games[0],  live_g2:S.games[1],
  });
}

/* ── DISPLAY ── */
function updateDisplay() {
  if(!S) return;
  // Names
  ['sb-t1','btn-n1'].forEach(id=>document.getElementById(id).textContent=S.team1);
  ['sb-t2','btn-n2'].forEach(id=>document.getElementById(id).textContent=S.team2);
  document.getElementById('info-line').textContent =
    `⏰ ${activeM.time} · Court ${activeM.court} · ${GRP_LBL[activeM.group]} · ${S.team1} vs ${S.team2}`;

  // Serving
  document.getElementById('sb-t1').className='sb-team'+(S.serving===0?' serving':'')+(S.winner===0?' winner-team':'');
  document.getElementById('sb-t2').className='sb-team'+(S.serving===1?' serving':'')+(S.winner===1?' winner-team':'');

  // Points
  document.getElementById('sb-p1').textContent=ptLabel(S.points[0],S.inTB);
  document.getElementById('sb-p2').textContent=ptLabel(S.points[1],S.inTB);
  document.getElementById('sb-p1').className='sb-pts'+(S.points[0]>S.points[1]?' leading':'');
  document.getElementById('sb-p2').className='sb-pts'+(S.points[1]>S.points[0]?' leading':'');

  // Games
  const g1disp = S.inTB ? `${S.games[0]}` : S.games[0];
  const g2disp = S.inTB ? `${S.games[1]}` : S.games[1];
  document.getElementById('sb-g1').textContent=S.inTB?`TB ${S.games[0]}`:S.games[0];
  document.getElementById('sb-g2').textContent=S.inTB?`TB ${S.games[1]}`:S.games[1];
  document.getElementById('sb-g1').className='sb-games'+(S.games[0]>S.games[1]?' leading':'');
  document.getElementById('sb-g2').className='sb-games'+(S.games[1]>S.games[0]?' leading':'');

  // Set badges
  document.getElementById('sb-sets').innerHTML=S.setScores.map(s=>{
    const cls=s.g1>s.g2?'won1':'won2';
    return `<span class="set-badge ${cls}">${s.g1}–${s.g2}</span>`;
  }).join('');

  // Format
  document.getElementById('sb-format').textContent=S.isKO?'NORMAL SET · KNOCKOUT':'SHORT SET · GROUP STAGE';

  // Status
  const st=document.getElementById('game-status');
  if(S.inTB){
    st.innerHTML=`<span class="tiebreak-badge">🎯 Tiebreak</span> First to 7 (lead by 2)`;
  } else if(isDeuce(S)){
    const d=S.points[0]-S.points[1];
    if(d===0) st.innerHTML=`<span class="hl">Deuce</span>`;
    else st.innerHTML=`Advantage <span class="hl">${d>0?S.team1:S.team2}</span>`;
  } else {
    st.innerHTML=`Games: <span class="hl">${S.games[0]} – ${S.games[1]}</span> &nbsp;·&nbsp; First to ${gameTarget(S)}`;
  }
}

/* ── PICKER RENDER ── */
let pickerUnsubscribe = null;
function renderPicker(md) {
  md=md||{};
  [{id:'sunday',list:SUNDAY},{id:'monday',list:MONDAY}].forEach(({id,list})=>{
    document.getElementById(`list-${id}`).innerHTML=list.map(m=>{
      const d=md[m.id]||{};
      const st=d.status||'pending';
      const t1=d.team1||m.team1, t2=d.team2||m.team2;
      const isKO=m.group==='KO';
      const statusBadge={
        pending:`<span class="pick-status s-pending">Pending</span>`,
        live:   `<span class="pick-status s-live">🔴 Live</span>`,
        done:   `<span class="pick-status s-done">✓ Done</span>`,
      }[st]||'';
      const koInputs=isKO?`
        <div class="ko-inputs" id="ko-${m.id}">
          <div class="ko-inputs-label">Enter actual team names</div>
          <div class="ko-inputs-grid">
            <input class="ko-input" id="ko-t1-${m.id}" placeholder="${m.team1}" value="${d.team1&&!['1A','1B','1C','2A','2B','2C','Best 3rd ★','W QF1','W QF2','W QF3','W QF4','W SF1','W SF2'].includes(d.team1)?d.team1:''}" />
            <input class="ko-input" id="ko-t2-${m.id}" placeholder="${m.team2}" value="${d.team2&&!['1A','1B','1C','2A','2B','2C','Best 3rd ★','W QF1','W QF2','W QF3','W QF4','W SF1','W SF2'].includes(d.team2)?d.team2:''}" />
          </div>
          <button class="ko-start-btn" onclick="startKO('${m.id}')">🎾 Start Match</button>
        </div>`:''
      ;
      return `<div style="border-radius:10px;overflow:hidden;border:1px solid rgba(132,75,255,.2);" class="${st}">
        <button class="match-pick-btn" style="border:none;border-radius:0;width:100%;" onclick="${isKO?`toggleKO('${m.id}')`:`selectMatch('${m.id}')`}">
          <div>
            <div class="pick-time">⏰ ${m.time} · C${m.court}</div>
            <span class="pick-grp ${GRP_CLS[m.group]}">${m.group==='KO'?m.id:'Grp '+m.group}</span>
          </div>
          <div class="pick-teams">${t1} <em>vs</em> ${t2}</div>
          ${statusBadge}
        </button>
        ${koInputs}
      </div>`;
    }).join('');
  });
}

window.toggleKO = function(id) {
  const el=document.getElementById(`ko-${id}`);
  if(el) el.classList.toggle('show');
};

window.startKO = function(id) {
  const m=ALL.find(x=>x.id===id); if(!m) return;
  const t1=document.getElementById(`ko-t1-${id}`)?.value.trim()||m.team1;
  const t2=document.getElementById(`ko-t2-${id}`)?.value.trim()||m.team2;
  launchScoring(m,t1,t2);
};

window.selectMatch = function(id) {
  const m=ALL.find(x=>x.id===id); if(!m) return;
  launchScoring(m,m.team1,m.team2);
};

function launchScoring(m,t1,t2) {
  activeM=m;
  fbRef=ref(db,`matches/${m.id}`);
  S=fresh(m,t1,t2);
  H=[]; document.getElementById('btn-undo').disabled=true;
  update(fbRef,{status:'live',team1:t1,team2:t2});
  updateDisplay();
  showScreen('scoring');
}

window.goBack = function() {
  S=null; H=[]; activeM=null; fbRef=null;
  showScreen('picker');
};

/* ── SCREENS ── */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
    s.style.display='';
  });
  const el=document.getElementById(`screen-${name}`);
  if(el){ el.classList.add('active'); }
}

/* ── FIREBASE LISTENER ── */
onValue(ref(db,'matches'),snap=>renderPicker(snap.val()));

/* ── AUTH ── */
const PWD='rpt2026ref';
window.doLogin=function(){
  if(document.getElementById('pwd-input').value===PWD){
    document.getElementById('login-error').style.display='none';
    sessionStorage.setItem('ref-auth','1');
    showScreen('picker');
  } else {
    document.getElementById('login-error').style.display='block';
  }
};
window.doLogout=function(){
  sessionStorage.removeItem('ref-auth');
  showScreen('login');
  document.getElementById('pwd-input').value='';
};
if(sessionStorage.getItem('ref-auth')==='1') showScreen('picker');

/* ── TOAST ── */
function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
